name: 🚀 NebulaForge X CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.9'

jobs:
  # =============================================
  # 🧪 Frontend Testing & Build
  # =============================================
  frontend-test:
    name: 🎨 Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📥 Install dependencies
      run: npm ci
      
    - name: 🔍 Lint code
      run: npm run lint
      
    - name: 🧪 Run tests
      run: npm run test
      
    - name: 🏗️ Build frontend
      run: npm run build:frontend
      
    - name: 📊 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: dist/
        retention-days: 7

  # =============================================
  # 🐍 Backend Testing
  # =============================================
  backend-test:
    name: 🔧 Backend Tests
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: 📥 Install Python dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx
        
    - name: 🧪 Run backend tests
      run: |
        cd backend
        pytest tests/ -v --tb=short
        
    - name: 🔍 Code quality check
      run: |
        cd backend
        pip install flake8 black isort
        flake8 app/ --max-line-length=100 --exclude=migrations
        black --check app/
        isort --check-only app/

  # =============================================
  # 🔒 Security Scanning
  # =============================================
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔍 Run security audit (npm)
      run: npm audit --audit-level=high
      
    - name: 🔍 Run Snyk security scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
      continue-on-error: true

  # =============================================
  # 📱 Mobile Build Test
  # =============================================
  mobile-build:
    name: 📱 Mobile Build Test
    runs-on: ubuntu-latest
    needs: frontend-test
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '11'
        
    - name: 📥 Install dependencies
      run: npm ci
      
    - name: 📥 Download frontend build
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: dist/
        
    - name: 🔧 Setup Capacitor
      run: |
        npm install -g @capacitor/cli
        npx cap init "NebulaForge X" "com.nebulaforge.x" --web-dir="dist"
        npx cap add android
        
    - name: 🏗️ Build Android (debug)
      run: |
        npx cap sync android
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: 📊 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nebulaforge-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

  # =============================================
  # 🚀 Deployment
  # =============================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test, security-scan]
    if: github.ref == 'refs/heads/develop'
    
    environment:
      name: staging
      url: https://staging.nebulaforge.com
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📥 Download frontend build
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: dist/
        
    - name: 🚀 Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment..."
        echo "📁 Frontend: dist/"
        echo "🔧 Backend: backend/"
        # Add your deployment commands here
        
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test, security-scan, mobile-build]
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: https://nebulaforge.com
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📥 Download frontend build
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: dist/
        
    - name: 📥 Download APK
      uses: actions/download-artifact@v4
      with:
        name: nebulaforge-debug-apk
        path: builds/
        
    - name: 🚀 Deploy to production
      run: |
        echo "🚀 Deploying to production environment..."
        echo "📁 Frontend: dist/"
        echo "🔧 Backend: backend/"
        echo "📱 APK: builds/app-debug.apk"
        # Add your deployment commands here

  # =============================================
  # 📊 Performance Testing
  # =============================================
  performance-test:
    name: ⚡ Performance Test
    runs-on: ubuntu-latest
    needs: frontend-test
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: 📥 Install dependencies
      run: npm ci
      
    - name: 📥 Download frontend build
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: dist/
        
    - name: 🚀 Start server
      run: |
        npm run preview &
        sleep 10
        
    - name: ⚡ Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v10
      with:
        configPath: './lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true

  # =============================================
  # 📦 Release
  # =============================================
  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [frontend-test, backend-test, mobile-build]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📥 Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: 📦 Create release package
      run: |
        mkdir -p release
        cp -r frontend-dist release/web
        cp -r nebulaforge-debug-apk/*.apk release/
        zip -r nebulaforge-x-${{ github.event.release.tag_name }}.zip release/
        
    - name: 📊 Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./nebulaforge-x-${{ github.event.release.tag_name }}.zip
        asset_name: nebulaforge-x-${{ github.event.release.tag_name }}.zip
        asset_content_type: application/zip

  # =============================================
  # 🤖 AI Code Quality Check
  # =============================================
  ai-code-review:
    name: 🤖 AI Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🤖 AI Code Analysis
      run: |
        echo "🤖 Running AI-powered code analysis..."
        echo "📊 Analyzing code quality, performance, and security..."
        echo "🎯 NebulaForge X AI modules are self-monitoring!"
        # This would integrate with actual AI code review tools